<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotworm Killer — Statistics</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0d0900;
            color: #ddc88a;
            font-family: Verdana, sans-serif;
            min-height: 100vh;
        }

        /* Nav */
        #top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
            background: #0d0900;
            border-bottom: 2px solid #7a5818;
            box-shadow: 0 2px 8px #00000099;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-logo {
            color: #f0c040;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 10px #c8800070;
        }
        .nav-links { display: flex; gap: 4px; }
        .nav-btn {
            padding: 4px 14px;
            background: #1a1006;
            color: #6a5030;
            border: 1px solid #3a2408;
            cursor: pointer;
            font-size: 11px;
            font-family: Verdana, sans-serif;
            text-decoration: none;
            display: inline-block;
            line-height: 22px;
        }
        .nav-btn:hover { background: #241408; color: #c0a050; }
        .nav-btn.nav-active {
            background: #2e1e08;
            color: #f0c040;
            border-color: #7a5818;
            box-shadow: inset 0 1px 0 #6a4e14;
        }

        /* Page layout */
        #page {
            max-width: 920px;
            margin: 24px auto;
            padding: 0 12px;
        }

        h1 {
            color: #f0c040;
            font-size: 18px;
            letter-spacing: 1px;
            margin-bottom: 18px;
            text-shadow: 0 0 12px #c8800055;
        }

        /* Banner cards */
        #banner {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }
        .stat-card {
            flex: 1 1 160px;
            background: #17100a;
            border: 1px solid #3a2408;
            border-radius: 4px;
            padding: 14px 18px;
            text-align: center;
        }
        .stat-card .val {
            font-size: 28px;
            font-weight: bold;
            color: #f0c040;
            line-height: 1.1;
            text-shadow: 0 0 10px #c8800055;
        }
        .stat-card .lbl {
            font-size: 10px;
            color: #7a6030;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        .stat-card.online .val { color: #55dd55; text-shadow: 0 0 10px #00cc0055; }

        /* Scoreboard table */
        #scoreboard-wrap {
            background: #17100a;
            border: 1px solid #3a2408;
            border-radius: 4px;
            overflow: hidden;
        }
        .sb-title {
            padding: 10px 16px;
            background: #1e1408;
            border-bottom: 1px solid #3a2408;
            font-size: 13px;
            color: #c0a050;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .sb-title span { font-size: 10px; color: #5a4020; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        thead th {
            background: #1e1408;
            padding: 8px 12px;
            text-align: left;
            color: #7a6030;
            font-weight: normal;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #2e1c08;
        }
        thead th.num { text-align: right; }
        tbody tr {
            border-bottom: 1px solid #1e1408;
            transition: background 0.1s;
        }
        tbody tr:hover { background: #1e1408; }
        tbody tr:last-child { border-bottom: none; }
        td {
            padding: 7px 12px;
            color: #ddc88a;
        }
        td.num { text-align: right; color: #c0a050; }
        td.rank { color: #5a4020; width: 48px; }
        td.rank.top1 { color: #f0c040; font-weight: bold; }
        td.rank.top3 { color: #c8a040; }
        td.rank.top10 { color: #a08030; }
        td.username { font-weight: bold; }
        td.clicks { color: #7a9060; }

        /* Search */
        #search-wrap {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #search-wrap input {
            background: #17100a;
            border: 1px solid #3a2408;
            color: #ddc88a;
            padding: 5px 10px;
            font-family: Verdana, sans-serif;
            font-size: 12px;
            width: 220px;
            outline: none;
        }
        #search-wrap input::placeholder { color: #4a3018; }
        #search-wrap input:focus { border-color: #7a5818; }
        #result-count { font-size: 11px; color: #5a4020; }

        /* refresh indicator */
        #refresh-info {
            font-size: 10px;
            color: #4a3018;
            margin-top: 14px;
            text-align: right;
        }
        #refresh-info span { color: #7a6030; }

        .loading { padding: 24px; text-align: center; color: #5a4020; font-size: 12px; }
        .error   { padding: 24px; text-align: center; color: #cc4444; font-size: 12px; }
    </style>
</head>
<body>

<nav id="top-nav">
    <span class="nav-logo">⚔ Rotworm Killer</span>
    <div class="nav-links">
        <a class="nav-btn" href="/">▶ Game</a>
        <a class="nav-btn nav-active" href="/stats.html">📊 Statistics</a>
    </div>
</nav>

<div id="page">
    <h1>📊 Community Statistics</h1>

    <div id="banner">
        <div class="stat-card">
            <div class="val" id="stat-total">—</div>
            <div class="lbl">Registered Players</div>
        </div>
        <div class="stat-card online">
            <div class="val" id="stat-5min">—</div>
            <div class="lbl">Playing Right Now <small style="display:block;font-size:9px;color:#338833">(active in last 5 min)</small></div>
        </div>
        <div class="stat-card">
            <div class="val" id="stat-1h">—</div>
            <div class="lbl">Active Last Hour</div>
        </div>
        <div class="stat-card">
            <div class="val" id="stat-24h">—</div>
            <div class="lbl">Active Today</div>
        </div>
    </div>

    <div id="search-wrap">
        <input id="search" type="text" placeholder="Search player…" oninput="filterTable()">
        <span id="result-count"></span>
    </div>

    <div id="scoreboard-wrap">
        <div class="sb-title">
            Full Scoreboard
            <span id="updated-at">Loading…</span>
        </div>
        <div id="table-container"><div class="loading">Loading statistics…</div></div>
    </div>

    <div id="refresh-info">Auto-refreshes every <span>30s</span> &nbsp;·&nbsp; Last update: <span id="last-update">—</span></div>
</div>

<script>
    let allPlayers = [];

    function fmt(n) {
        if (n == null) return '—';
        return n.toLocaleString();
    }

    function rankClass(rank) {
        if (rank === 1) return 'top1';
        if (rank <= 3)  return 'top3';
        if (rank <= 10) return 'top10';
        return '';
    }

    function renderTable(players) {
        if (!players.length) {
            document.getElementById('table-container').innerHTML =
                '<div class="loading">No players match your search.</div>';
            return;
        }
        let html = `<table>
            <thead>
                <tr>
                    <th class="num">#</th>
                    <th>Player</th>
                    <th class="num">Score</th>
                    <th class="num">Level</th>
                    <th class="num">Clicks</th>
                </tr>
            </thead><tbody>`;
        for (const p of players) {
            const rc = rankClass(p.rank);
            html += `<tr>
                <td class="rank num ${rc}">${p.rank}</td>
                <td class="username">${escHtml(p.username)}</td>
                <td class="num">${fmt(p.score)}</td>
                <td class="num">${fmt(p.level)}</td>
                <td class="num clicks">${fmt(p.totalClicks)}</td>
            </tr>`;
        }
        html += '</tbody></table>';
        document.getElementById('table-container').innerHTML = html;
    }

    function filterTable() {
        const q = document.getElementById('search').value.trim().toLowerCase();
        const filtered = q ? allPlayers.filter(p => p.username.toLowerCase().includes(q)) : allPlayers;
        document.getElementById('result-count').textContent =
            q ? `${filtered.length} / ${allPlayers.length} players` : `${allPlayers.length} players`;
        renderTable(filtered);
    }

    function escHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function loadStats() {
        try {
            const res = await fetch('/api/stats');
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();

            document.getElementById('stat-total').textContent = fmt(data.totalPlayers);
            document.getElementById('stat-5min').textContent  = fmt(data.activeLast5Min);
            document.getElementById('stat-1h').textContent    = fmt(data.activeLast1h);
            document.getElementById('stat-24h').textContent   = fmt(data.activeLast24h);

            allPlayers = data.players || [];
            filterTable();

            const now = new Date();
            const t = now.toLocaleTimeString();
            document.getElementById('last-update').textContent = t;
            document.getElementById('updated-at').textContent  = 'Updated ' + t;
        } catch (e) {
            document.getElementById('table-container').innerHTML =
                `<div class="error">Failed to load statistics: ${e.message}</div>`;
        }
    }

    loadStats();
    setInterval(loadStats, 30_000);
</script>
</body>
</html>
