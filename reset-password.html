<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotworm Killer – Reset Password</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div class="auth-box">
        <h2 class="auth-title">Rotworm Killer</h2>
        <div id="reset-content">
            <p class="auth-panel-title">Set New Password</p>
            <label class="auth-label">New Password <span class="auth-hint">(min 4 chars)</span></label>
            <input id="new-pass" type="password" class="auth-input" autocomplete="new-password" placeholder="New password">
            <label class="auth-label" style="margin-top:4px">Confirm Password</label>
            <input id="confirm-pass" type="password" class="auth-input" autocomplete="new-password" placeholder="Repeat password">
            <div id="reset-msg" class="auth-error" style="min-height:16px;margin-top:4px"></div>
            <button id="reset-btn" class="auth-submit" style="margin-top:6px">Reset Password</button>
            <div class="auth-back" style="margin-top:10px">
                <a href="/" style="color:#8a7040;font-size:10px;text-decoration:none">&larr; Back to game</a>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(location.search);
        const token  = params.get('token') || '';

        if (!token) {
            document.getElementById('reset-content').innerHTML =
                '<p style="color:#e05050;font-size:11px;text-align:center;line-height:1.5">' +
                'Invalid or missing reset link.<br>' +
                '<a href="/" style="color:#8a7040;font-size:10px">Back to game</a></p>';
        }

        document.getElementById('reset-btn').addEventListener('click', async () => {
            const pass    = document.getElementById('new-pass').value;
            const confirm = document.getElementById('confirm-pass').value;
            const msgEl   = document.getElementById('reset-msg');
            const btn     = document.getElementById('reset-btn');

            msgEl.style.color = '#e05050';
            msgEl.textContent = '';

            if (pass.length < 4) {
                msgEl.textContent = 'Password must be at least 4 characters.';
                return;
            }
            if (pass !== confirm) {
                msgEl.textContent = 'Passwords do not match.';
                return;
            }

            btn.disabled = true;
            try {
                const res  = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password: pass }),
                });
                const data = await res.json();
                if (data.error) {
                    msgEl.textContent = data.error;
                    btn.disabled = false;
                    return;
                }
                msgEl.style.color = '#7fff9e';
                msgEl.textContent = 'Password reset successfully! Redirecting to login…';
                setTimeout(() => { location.href = '/'; }, 2500);
            } catch (_) {
                msgEl.textContent = 'Connection error. Please try again.';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
